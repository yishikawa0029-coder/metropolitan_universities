  "芸術・デザイン":["芸術","美術","音楽","デザイン","造形","映像","演劇","舞台","クリエイティブ"],
  "総合・教養・その他":["教養","総合","リベラルアーツ","観光","ホスピタリティ","航空","宗教","仏教","神学","不動産","福祉社会デザイン","AIライフデザイン","共創","共生"]
};

function matchDeptGroup(deptStr, group){
  const keys=DEPT_MAP[group];
  if(!keys)return false;
  const parts=deptStr.split('・').map(x=>x.trim());
  return parts.some(p=>keys.some(k=>p.includes(k)));
}

function deptHighlight(deptStr, group){
  if(!group)return deptStr;
  const keys=DEPT_MAP[group]||[];
  return deptStr.split('・').map(p=>{
    const t=p.trim();
    return keys.some(k=>t.includes(k))
      ?`<span style="background:var(--nb);color:var(--nt);border-radius:3px;padding:0 3px;font-weight:500">${t}</span>`
      :t;
  }).join('・');
}

function cHTML(arr){
  return arr.map(x=>`<div style="margin-bottom:3px"><span class="cn">${x.n}</span><br><span class="cs">${x.s}</span></div>`).join('');
}

function deptHTML(u, activeGroup){
  return deptHighlight(u.dept, activeGroup)+(u.nd?`<span class="new-info">[新] ${u.nd}</span>`:'');
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const ft=document.getElementById('ft').value;
  const ff=document.getElementById('ff').value;
  const fd=document.getElementById('fd').value;
  const fdept=document.getElementById('fdept').value;
  let d=U.filter(u=>{
    if(q){
      const ct=u.c.map(x=>x.n+x.s).join('').toLowerCase();
      if(!u.name.toLowerCase().includes(q)&&!u.dept.toLowerCase().includes(q)&&!ct.includes(q)&&!(u.nd||'').toLowerCase().includes(q))return false;
    }
    if(ft&&u.type!==ft)return false;
    if(ff&&u.field!==ff)return false;
    if(fd==='s'){if(!u.senmon)return false;}
    else if(fd){if(u.senmon||u.diff!==parseInt(fd))return false;}
    if(fdept&&!matchDeptGroup(u.dept,fdept))return false;
    return true;
  });
  if(sCol){
    d=[...d].sort((a,b)=>{
      let av=a[sCol],bv=b[sCol];
      return typeof av==='string'?sDir*av.localeCompare(bv,'ja'):sDir*(av-bv);
    });
  }
  document.getElementById('stats').textContent=`${d.length} / ${U.length} 校`;
  const tb=document.getElementById('tbody');
  if(!d.length){tb.innerHTML=`<tr><td colspan="7" class="empty">該当する大学が見つかりません</td></tr>`;return;}
  tb.innerHTML=d.map(u=>`<tr>
    <td><a class="ulink" href="${u.url}" target="_blank" rel="noopener">${u.name}<span class="ext">↗</span></a>${u.nd?`<span class="nbadge">★NEW</span>`:''} ${u.senmon?`<span class="sbadge">専門職大学</span>`:''}</td>
    <td><span class="badge ${u.type==='国公立'?'nat':'prv'}">${u.type}</span></td>
    <td>${u.field}</td>
    <td class="dept">${deptHTML(u,fdept)}</td>
    <td>${u.senmon?`<span style="font-size:11px;color:var(--text2)">専門職大学</span>`:`<span class="badge ${DC[u.diff]}">${DL[u.diff]}</span>`}</td>
    <td class="hv">${u.hv}</td>
    <td class="cc">${cHTML(u.c)}</td>
  </tr>`).join('');
}

['search','ft','ff','fd','fdept'].forEach(id=>{
  document.getElementById(id).addEventListener(id==='search'?'input':'change',render);
});
document.querySelectorAll('th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    const c=th.dataset.col;
    if(sCol===c)sDir*=-1;else{sCol=c;sDir=1;}
    document.querySelectorAll('th').forEach(t=>t.className='');
    th.className=sDir===1?'asc':'desc';
    render();
  });
});
render();
</script>
</body>
</html>
